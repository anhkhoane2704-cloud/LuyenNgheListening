<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Nghe Tiếng Anh - Điền Từ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
        }
        .blank-input {
            transition: all 0.3s ease;
        }
        .blank-input:focus {
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 px-8 py-6 text-white text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none" style="background-image: url('data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' viewBox=\'0 0 20 20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'1\' fill-rule=\'evenodd\'%3E%3Ccircle cx=\'3\' cy=\'3\' r=\'3\'/%3E%3Ccircle cx=\'13\' cy=\'13\' r=\'3\'/%3E%3C/g%3E%3C/svg%3E');"></div>
            <h1 class="text-3xl font-extrabold tracking-tight mb-2"><i class="fas fa-headphones-alt mr-3"></i>Luyện Nghe Điền Từ</h1>
            <p class="text-indigo-100 font-medium">Lựa chọn bài học, tải file audio tương ứng và bắt đầu điền từ vào chỗ trống</p>
        </div>

        <div class="p-8">
            <!-- Tabs chọn bài học -->
            <div class="flex justify-center space-x-4 mb-8">
                <button id="btn-unit8" onclick="switchLesson('unit8')" class="px-6 py-3 rounded-lg font-bold transition-all duration-200 bg-indigo-600 text-white shadow-md">
                    <i class="fas fa-book-open mr-2"></i> Bài Unit 8
                </button>
                <button id="btn-unit9" onclick="switchLesson('unit9')" class="px-6 py-3 rounded-lg font-bold transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-gray-300">
                    <i class="fas fa-book-open mr-2"></i> Bài Unit 9
                </button>
            </div>

            <!-- Audio Player -->
            <div class="bg-gray-50 rounded-xl p-4 border border-gray-200 mb-8 shadow-sm">
                <p class="text-sm text-gray-500 font-semibold mb-2 uppercase tracking-wider"><i class="fas fa-play-circle mr-1"></i> Audio Bài Nghe</p>
                <div class="mb-3">
                    <label for="audio-upload" class="block text-sm font-medium text-gray-700 mb-2">Tải file MP3 của bài đang chọn từ thiết bị của bạn:</label>
                    <input type="file" id="audio-upload" accept="audio/*" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200 cursor-pointer transition-colors">
                </div>
                <audio id="audio-player" controls class="w-full rounded-lg hidden">
                    Trình duyệt của bạn không hỗ trợ thẻ audio.
                </audio>
            </div>

            <!-- Instructions -->
            <div class="mb-6 flex justify-between items-center bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                <p class="text-blue-800 text-sm md:text-base">
                    <strong>Hướng dẫn:</strong> Hệ thống tự động đục lỗ 5 từ vựng. Bạn hãy nghe và gõ từ còn thiếu vào ô trống. Bấm "Xáo trộn lại" để làm mới bài tập với các từ khác.
                </p>
            </div>

            <!-- Transcript Area -->
            <div id="transcript-container" class="space-y-4 mb-8 bg-white p-6 rounded-xl border border-gray-100 shadow-inner text-gray-800">
                <!-- Nội dung sẽ được tạo tự động bằng JS -->
            </div>

            <!-- Result Box -->
            <div id="result" class="hidden mb-6 p-4 rounded-xl text-center text-lg font-bold shadow-sm transition-all duration-300">
            </div>

            <!-- Controls -->
            <div class="flex flex-wrap gap-4 justify-center">
                <button onclick="checkAnswers()" class="flex-1 min-w-[150px] bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all duration-200 flex items-center justify-center gap-2">
                    <i class="fas fa-check-circle"></i> Kiểm tra
                </button>
                <button onclick="showAnswers()" class="flex-1 min-w-[150px] bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all duration-200 flex items-center justify-center gap-2">
                    <i class="fas fa-eye"></i> Xem đáp án
                </button>
                <button onclick="initGame()" class="flex-1 min-w-[150px] bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition-all duration-200 flex items-center justify-center gap-2">
                    <i class="fas fa-random"></i> Xáo trộn lại
                </button>
            </div>
        </div>
    </div>

    <script>
        // Dữ liệu cho các bài học
        const lessonsData = {
            "unit8": [
                { speaker: "Nam", text: "Mai, why don't you answer your phone? It keeps ringing." },
                { speaker: "Mai", text: "It’s my mum who's calling me again. She wants me to contact her from time to time while I’m out." },
                { speaker: "Nam", text: "My parents used to be like that. They thought I didn’t have the confidence to deal with difficult situations." },
                { speaker: "Mark", text: "I had the same experience. It was earning my parents’ trust that took a long time. But I managed to convince them that I'm responsible when I’m out and about." },
                { speaker: "Mai", text: "It’s my parents who still think I don’t have the skills to be independent. I'm not good at managing my time or money, but I’m independent at home - I can cook, clean the house, and do my laundry!" },
                { speaker: "Nam", text: "That’s a good start! I use a time-management app to plan my weekly schedule including all my activities and responsibilities. Would you like me to help you install it?" },
                { speaker: "Mai", text: "That'd be great. Thanks, Nam." },
                { speaker: "Mark", text: "I use a money-management app. It’s the app that taught me how to be responsible with money." },
                { speaker: "Mai", text: "Mark, can you show it to me?" },
                { speaker: "Mark", text: "No problem. My parents also encourage me to take part-time jobs and pay me for doing certain chores around the house." },
                { speaker: "Mai", text: "Lucky you!" }
            ],
            "unit9": [
                { speaker: "Mark", text: "Hi, everyone. Last time our club met, we decided to start an awareness campaign to draw attention to a pressing social issue. So have you thought about any issues that we could focus on?" },
                { speaker: "Mai", text: "Yes, I think we should promote issues that affect a lot of people in our city, such as crime and overpopulation." },
                { speaker: "Nam", text: "I like your ideas, Mai, but I think we should plan our campaign around social issues that directly affect teenagers like us." },
                { speaker: "Mark", text: "Can you give us some examples?" },
                { speaker: "Nam", text: "Well, bullying, peer pressure, and body shaming, for instance, are major problems among teenagers today although many people don’t feel comfortable talking about them." },
                { speaker: "Mai", text: "I agree with you. Hmm... so Mark, what do you think? Should we focus our campaign on a general social issue or one affecting mainly teens?" },
                { speaker: "Mark", text: "Hmm. I think this time we should focus on a problem teens struggle with every day because this won't be a big campaign. However, we'll try to use your ideas for another project, Mai." },
                { speaker: "Mai", text: "Sounds good! Now let’s decide on a social issue. Is the top problem facing teens today peer pressure, body shaming, or bullying?" },
                { speaker: "Nam", text: "I think it’s bullying because it’s very common today, and ..." }
            ]
        };

        let currentLessonId = 'unit8';
        let parsedData = [];
        let allValidWords = [];

        // Xử lý tải file audio từ máy tính người dùng
        document.getElementById('audio-upload').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const audioPlayer = document.getElementById('audio-player');
                audioPlayer.src = URL.createObjectURL(file);
                audioPlayer.classList.remove('hidden');
            }
        });

        // Hàm chuyển đổi giữa các bài
        function switchLesson(lessonId) {
            currentLessonId = lessonId;
            
            // Cập nhật giao diện tab
            if (lessonId === 'unit8') {
                document.getElementById('btn-unit8').className = "px-6 py-3 rounded-lg font-bold transition-all duration-200 bg-indigo-600 text-white shadow-md";
                document.getElementById('btn-unit9').className = "px-6 py-3 rounded-lg font-bold transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-gray-300";
            } else {
                document.getElementById('btn-unit9').className = "px-6 py-3 rounded-lg font-bold transition-all duration-200 bg-indigo-600 text-white shadow-md";
                document.getElementById('btn-unit8').className = "px-6 py-3 rounded-lg font-bold transition-all duration-200 bg-gray-200 text-gray-700 hover:bg-gray-300";
            }

            // Reset file upload & audio player
            document.getElementById('audio-upload').value = '';
            const audioPlayer = document.getElementById('audio-player');
            audioPlayer.src = '';
            audioPlayer.classList.add('hidden');

            // Nạp dữ liệu mới
            prepareData();
            initGame();
        }

        // Hàm tách chuỗi thành các token (từ vựng từ 5 chữ cái trở lên)
        function tokenize(text) {
            const regex = /([a-zA-Z]{5,})|([^a-zA-Z]+|[a-zA-Z]{1,4})/g;
            let tokens = [];
            let match;
            while ((match = regex.exec(text)) !== null) {
                if (match[1]) {
                    tokens.push({ type: 'word', text: match[1], isBlank: false });
                } else {
                    tokens.push({ type: 'other', text: match[2], isBlank: false });
                }
            }
            return tokens;
        }

        // Khởi tạo dữ liệu từ bài học hiện tại
        function prepareData() {
            allValidWords = [];
            parsedData = lessonsData[currentLessonId].map((line, lIdx) => {
                let tokens = tokenize(line.text);
                tokens.forEach((token, tIdx) => {
                    if (token.type === 'word') {
                        allValidWords.push({ lIdx, tIdx, text: token.text });
                    }
                });
                return { speaker: line.speaker, tokens: tokens };
            });
        }

        // Hiển thị đoạn hội thoại với ô trống
        function renderTranscript() {
            const container = document.getElementById('transcript-container');
            container.innerHTML = '';
            
            parsedData.forEach((line, lIdx) => {
                let p = document.createElement('p');
                p.className = 'text-lg leading-relaxed';

                let speakerSpan = document.createElement('span');
                speakerSpan.className = 'font-bold text-indigo-700 mr-2 w-16 inline-block';
                speakerSpan.textContent = line.speaker + ':';
                p.appendChild(speakerSpan);

                line.tokens.forEach((token, tIdx) => {
                    if (token.isBlank) {
                        let inputWidth = Math.max(4, token.text.length * 0.8) + 'rem';
                        let input = document.createElement('input');
                        input.type = 'text';
                        input.style.width = inputWidth;
                        input.className = 'blank-input mx-1 px-2 py-0.5 border-b-2 border-gray-400 bg-gray-50 focus:outline-none focus:border-indigo-600 text-center text-indigo-700 font-semibold rounded-t-sm';
                        input.dataset.answer = token.text;
                        input.dataset.lIdx = lIdx;
                        input.dataset.tIdx = tIdx;
                        input.autocomplete = "off";
                        p.appendChild(input);
                    } else {
                        let textNode = document.createTextNode(token.text);
                        p.appendChild(textNode);
                    }
                });
                container.appendChild(p);
            });
        }

        // Tạo màn chơi mới
        function initGame() {
            parsedData.forEach(line => {
                line.tokens.forEach(token => token.isBlank = false);
            });

            // Chọn ngẫu nhiên 5 từ
            let shuffled = [...allValidWords].sort(() => 0.5 - Math.random());
            let selected = shuffled.slice(0, 5);
            
            selected.forEach(item => {
                parsedData[item.lIdx].tokens[item.tIdx].isBlank = true;
            });

            document.getElementById('result').style.display = 'none';
            renderTranscript();
        }

        // Kiểm tra kết quả thông minh
        function checkAnswers() {
            let inputs = document.querySelectorAll('.blank-input');
            let correctCount = 0;
            
            inputs.forEach(input => {
                let answer = input.dataset.answer.toLowerCase();
                let userAnswer = input.value.trim().toLowerCase();
                
                // Loại bỏ những kí tự thừa (khoảng trắng dư, dấu câu bị người dùng gõ nhầm)
                userAnswer = userAnswer.replace(/[^a-z]/g, '');
                
                input.className = input.className.replace(/border-\w+-\d+/g, '').replace(/text-\w+-\d+/g, '').replace(/bg-\w+-\d+/g, '');
                
                if (userAnswer === answer) {
                    input.classList.add('border-green-500', 'text-green-700', 'bg-green-50');
                    correctCount++;
                } else {
                    input.classList.add('border-red-500', 'text-red-700', 'bg-red-50');
                }
            });

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = correctCount === 5 
                ? `<i class="fas fa-crown text-yellow-500 mr-2"></i> Xuất sắc! Bạn đúng <strong>${correctCount}/5</strong> câu.`
                : `<i class="fas fa-info-circle mr-2"></i> Bạn trả lời đúng <strong>${correctCount}/5</strong> câu. Cố gắng thêm chút nữa nhé!`;
            
            resultDiv.className = `mt-4 p-4 rounded-xl text-lg font-bold shadow-sm transition-all duration-300 block ${correctCount === 5 ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-yellow-100 text-yellow-800 border border-yellow-200'}`;
        }

        function showAnswers() {
            let inputs = document.querySelectorAll('.blank-input');
            inputs.forEach(input => {
                input.value = input.dataset.answer;
                input.className = input.className.replace(/border-\w+-\d+/g, '').replace(/text-\w+-\d+/g, '').replace(/bg-\w+-\d+/g, '');
                input.classList.add('border-green-500', 'text-green-700', 'bg-green-50');
            });
            document.getElementById('result').style.display = 'none';
        }

        // Chạy lần đầu tiên
        prepareData();
        initGame();

        // Cho phép nhấn Enter để kiểm tra
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                checkAnswers();
            }
        });
    </script>
</body>
</html>
